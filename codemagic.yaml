workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic_api_key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.smptamhar.portal
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    # Trigger manual dulu (start build dari dashboard Codemagic).
    # Kalau nanti mau otomatis tiap push ke main, aktifkan blok ini:
    # triggering:
    #   events:
    #     - push
    #   branch_patterns:
    #     - pattern: main
    #       include: true
    #   cancel_previous_builds: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Sync web assets into iOS project
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "$HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
