# nginx.conf — SMP Taman Harapan Bekasi (VPS production)
# Ganti "smptamhar.sch.id" dengan domain asli sekolah, lalu sesuaikan path
# sertifikat (contoh ini pakai Let's Encrypt / certbot default path).
#
# Cara pakai di VPS (Ubuntu + nginx):
#   1. sudo cp nginx.conf /etc/nginx/sites-available/smptamhar
#   2. sudo ln -s /etc/nginx/sites-available/smptamhar /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d smptamhar.sch.id -d www.smptamhar.sch.id
#   4. sudo nginx -t && sudo systemctl reload nginx

# Redirect semua HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name smptamhar.sch.id www.smptamhar.sch.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smptamhar.sch.id www.smptamhar.sch.id;

    # --- TLS (certbot mengisi 2 baris ini otomatis, biarkan placeholder) ---
    ssl_certificate     /etc/letsencrypt/live/smptamhar.sch.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smptamhar.sch.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/smptamhar/dist;
    index index.html;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=()" always;
    # Kamera dibutuhkan untuk fitur scan barcode murid (CameraBarcodeScanner).

    # Content-Security-Policy — sesuaikan domain Supabase project Anda jika beda.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://ipapi.co; media-src 'self' blob:; worker-src 'self' blob:; frame-ancestors 'self';" always;

    # Cache aset yang sudah di-hash Vite (index-XXXXXXXX.js/css) selamanya
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker & manifest PWA — jangan di-cache lama, supaya update
    # portal langsung kepakai user tanpa nunggu SW lama expire.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — semua route (termasuk #absen-murid, #kartu-barcode-murid
    # yang dipakai lewat hash routing) dilayani oleh index.html yang sama.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blokir akses langsung ke file konfigurasi/sumber yang tidak perlu dilayani
    location ~* \.(env|env\.local|log|sql)$ {
        deny all;
        return 404;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 10m;
}
